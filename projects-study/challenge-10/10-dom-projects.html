<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOM</title>

  <style>
    .js-subscribe-button, .button-calculate {
      border: 1px solid black;
      border-radius: 7px;
      background-color: bisque;
      font-size: 16px;
      font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
      padding: 4px;
      font-weight: bold;
      cursor: pointer;
    }

    .is-subscribed {
      background-color: gray;
      color: black;
    }

    input {
      border-radius: 7px;
      border: 2px solid black;
      font-size: 16px;
    }
  </style>


</head>
<body>
  
  <p>Youtube Subscribe Button</p>
  <button onclick="
    subscribe();
  " class="js-subscribe-button">Subscribe</button>

  <p>Amazon Shipping Calculator</p>
  <input placeholder="Cost of order" class="js-cost-input" onkeydown="
    handCostKeydown(event);
  ">
  <button class="button-calculate" onclick="
    calculateTotal();
  
  ">Calculate</button>
  <p class="js-total-cost"></p>

  <script>

    function handCostKeydown(event) {
      if (event.key === 'Enter') {
        calculateTotal();
      }
    }

    function calculateTotal() {
      const inputElement = document.querySelector('.js-cost-input')
      let cost = Number(inputElement.value);

      if (cost < 40) {
        cost += 10;
      }

      document.querySelector('.js-total-cost').innerHTML = `$${cost}`;
    }

    function subscribe() {
      const buttonElement = document.querySelector('.js-subscribe-button');

      if (buttonElement.innerHTML === 'Subscribe') {
        buttonElement.innerHTML = 'Subscribed';
        buttonElement.classList.add('is-subscribed');
      } else {
        buttonElement.innerHTML = 'Subscribe';
        buttonElement.classList.remove('is-subscribed');
      }
    }

  </script>
</body>
</html>
