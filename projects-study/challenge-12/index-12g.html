<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Functions</title>
</head>
<body>

  <button onclick="
    messages++;
    ">Add</button>
  <button onclick="
    if (messages > 0)
      messages--
  ">Remove</button>
  
  <script>
    let messages = 2;

    setInterval(function() {
      if (messages === 0) {
        document.title = 'App';
      } else {
        document.title = document.title === 'App' ? `(${messages}) New messages` : 'App';
      }
    }, 1000);
  </script>
</body>
</html>
