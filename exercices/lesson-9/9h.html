<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOM (Document Object Model)</title>
</head>
<body>
  <input type="text" placeholder="Type something" class="js-input"  onkeyup="
    const inputElement = document.querySelector('.js-input');
    document.querySelector('.typing').innerHTML = inputElement.value;
    ">

  <p class="typing"></p>
</body>
</html>
