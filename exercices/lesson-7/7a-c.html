<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Functions</title>
</head>
<body>
 

  <script>
    greet('Vinicius');
    greet('Jamon');
    greet();
  
    function greet(name){
      if (!name) {
        console.log(`Hello there!`);
      } else {
        console.log(`Hello ${name}!`);
      }
      
    }
  </script>
</body>
</html>
